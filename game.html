<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Conducción Vial - Prototipo</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #webgl-canvas { width: 100vw; height: 100vh; display: block; }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none; /* No interfiere con el canvas */
        }
        
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <canvas id="webgl-canvas"></canvas>

    <div id="ui">
        <h2>Simulador Vial v0.1</h2>
        <p>Logros: <span id="achievements-count">0</span> / 5</p>
    </div>

    <div id="instructions">
        Usa <b>W, A, S, D</b> para conducir | <b>R</b> para reiniciar
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, vehicle, ground, controls;
        let keys = {};

        // NUEVO: contenedor del mapa
        let world;

        // Configuración de movimiento (físicas simplificadas)
        let speed = 0;
        let acceleration = 0.005;
        let turnSpeed = 0.03;
        let friction = 0.98;
        let maxSpeed = 0.5;

        init();
        animate();

        function init() {
            // 1. Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0a0a0); // Fondo gris (asfalto)
            scene.fog = new THREE.Fog(0xa0a0a0, 10, 80); // un poco más lejos para ver "ciudad"

            // 2. Cámara
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10); // Posición inicial (arriba y atrás)

            // 3. Renderer
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // 4. Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 15, 5);
            scene.add(directionalLight);

            // 5. Suelo base (para que no quede "vacío" fuera del mapa)
            ground = new THREE.Mesh(
                new THREE.PlaneGeometry(300, 300),
                new THREE.MeshStandardMaterial({ color: 0x6b6b6b, depthWrite: false })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Grid suave (debug)
            const gridHelper = new THREE.GridHelper(200, 80, 0x000000, 0x000000);
            gridHelper.material.opacity = 0.08;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // NUEVO: crear "world" y el mapa
            world = new THREE.Group();
            scene.add(world);
            buildCityMap(world);

            // 6. CREACIÓN DEL "AUTITO" 3D (Formas básicas)
            vehicle = new THREE.Group();

            // Cuerpo del auto (Cubo rojo)
            const carBody = new THREE.Mesh(
                new THREE.BoxGeometry(1, 0.5, 2),
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            carBody.position.y = 0.35; // Un poco elevado para las ruedas
            vehicle.add(carBody);

            // Cabina (Cubo más pequeño)
            const carCabin = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 0.4, 1),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            carCabin.position.y = 0.75;
            carCabin.position.z = -0.2;
            vehicle.add(carCabin);

            // Ruedas (Cilindros)
            const wheelGeometry = new THREE.CylinderGeometry(0.25, 0.25, 0.2, 20);
            const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x111111 });

            const wheelPositions = [
                [-0.6, 0.25, 0.6], [0.6, 0.25, 0.6],   // Delanteras
                [-0.6, 0.25, -0.6], [0.6, 0.25, -0.6]  // Traseras
            ];

            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.rotation.z = Math.PI / 2; // Girar el cilindro
                vehicle.add(wheel);
            });

            scene.add(vehicle);
            vehicle.position.y = 0.1; // Ajuste fino sobre el suelo

            // 7. Controles de Cámara (Para depuración, después lo haremos automático)
            // controls = new OrbitControls(camera, renderer.domElement);
            // controls.enablePan = false;

            // Eventos
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        }

        // =========================
        // MAPA / CIUDAD (NUEVO)
        // =========================

        function buildCityMap(parent) {
            // Materiales básicos
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x2f2f2f, roughness: 1 });
            const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0xbfbfbf, roughness: 1 });
            const lineWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1 });
            const lineYellowMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f, roughness: 1 });

            // Helpers para construir piezas
            const ROAD_Y = 0.02;      // un pelín sobre el suelo base
            const SIDEWALK_Y = 0.06;  // vereda un poco más alta
            const LINE_Y = 0.03;

            function addRoadRect(x, z, w, d) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.04, d), roadMat);
                mesh.position.set(x, ROAD_Y, z);
                mesh.receiveShadow = false;
                parent.add(mesh);
                return mesh;
            }

            function addSidewalkRect(x, z, w, d) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.08, d), sidewalkMat);
                mesh.position.set(x, SIDEWALK_Y, z);
                parent.add(mesh);
                return mesh;
            }

            function addLineRect(x, z, w, d, mat) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 0.01, d), mat);
                mesh.position.set(x, LINE_Y, z);
                parent.add(mesh);
                return mesh;
            }

            // 1) Layout simple: una cruz (intersección) + calles laterales
            // Eje Z = norte/sur, eje X = este/oeste
            // Calles principales
            addRoadRect(0, 0, 12, 60);   // calle vertical
            addRoadRect(0, 0, 60, 12);   // calle horizontal

            // Veredas alrededor (bordes grandes)
            // Vertical: veredas a los lados de la calle vertical
            addSidewalkRect(-8, 0, 4, 60);
            addSidewalkRect(8, 0, 4, 60);

            // Horizontal: veredas arriba/abajo de la calle horizontal
            addSidewalkRect(0, -8, 60, 4);
            addSidewalkRect(0, 8, 60, 4);

            // 2) Líneas de carril (simples)
            // Línea central amarilla en calle vertical (segmentada)
            for (let z = -28; z <= 28; z += 4) {
                addLineRect(0, z, 0.25, 2, lineYellowMat);
            }
            // Línea central amarilla en calle horizontal (segmentada)
            for (let x = -28; x <= 28; x += 4) {
                addLineRect(x, 0, 2, 0.25, lineYellowMat);
            }

            // Líneas blancas de borde (continuas, simple)
            addLineRect(-5.5, 0, 0.2, 60, lineWhiteMat);
            addLineRect(5.5, 0, 0.2, 60, lineWhiteMat);
            addLineRect(0, -5.5, 60, 0.2, lineWhiteMat);
            addLineRect(0, 5.5, 60, 0.2, lineWhiteMat);

            // 3) Casas (bloques) en las manzanas
            // Casa simple
            function addHouse(x, z, w = 4, d = 4, h = 3, color = 0xd35400) {
                const house = new THREE.Group();

                const base = new THREE.Mesh(
                    new THREE.BoxGeometry(w, h, d),
                    new THREE.MeshStandardMaterial({ color })
                );
                base.position.y = h / 2;
                house.add(base);

                const roof = new THREE.Mesh(
                    new THREE.ConeGeometry(Math.max(w, d) * 0.65, 1.6, 4),
                    new THREE.MeshStandardMaterial({ color: 0x8e2c0b })
                );
                roof.position.y = h + 0.8;
                roof.rotation.y = Math.PI / 4;
                house.add(roof);

                house.position.set(x, 0.08, z);
                parent.add(house);
                return house;
            }

            // Algunas casas en cada cuadrante (separadas de la calle)
            const housePositions = [
                [-18, -18], [-24, -18], [-18, -24],
                [18, -18], [24, -18], [18, -24],
                [-18, 18], [-24, 18], [-18, 24],
                [18, 18], [24, 18], [18, 24],
            ];

            housePositions.forEach((p, i) => {
                const palette = [0xd35400, 0x2980b9, 0x27ae60, 0xf39c12, 0x8e44ad];
                addHouse(p[0], p[1], 4, 4, 3, palette[i % palette.length]);
            });

            // 4) Árboles
            function addTree(x, z) {
                const tree = new THREE.Group();

                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.25, 0.35, 2, 10),
                    new THREE.MeshStandardMaterial({ color: 0x6e3b1f })
                );
                trunk.position.y = 1;
                tree.add(trunk);

                const crown = new THREE.Mesh(
                    new THREE.SphereGeometry(1.1, 12, 12),
                    new THREE.MeshStandardMaterial({ color: 0x1f8f3a })
                );
                crown.position.y = 2.4;
                tree.add(crown);

                tree.position.set(x, 0.08, z);
                parent.add(tree);
                return tree;
            }

            // Filas de árboles en veredas (simple)
            for (let t = -24; t <= 24; t += 6) {
                addTree(-10, t);
                addTree(10, t);
                addTree(t, -10);
                addTree(t, 10);
            }

            // 5) Señalética chilena (prototipo)
            // - PARE (octágono rojo)
            // - CEDA EL PASO (triángulo invertido)
            // - LÍMITE 50 (círculo)
            function addSignPost(x, z, signType = 'PARE', rotY = 0) {
                const sign = new THREE.Group();

                const post = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.08, 0.08, 2.2, 10),
                    new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
                );
                post.position.y = 1.1;
                sign.add(post);

                let plateGeo, plateMat;

                if (signType === 'PARE') {
                    // Octágono: CylinderGeometry con 8 segmentos y poca altura
                    plateGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.08, 8);
                    plateMat = new THREE.MeshStandardMaterial({ color: 0xd00000 });
                } else if (signType === 'CEDA') {
                    // Triángulo: ConeGeometry de 3 lados, luego rotar
                    plateGeo = new THREE.ConeGeometry(0.65, 0.08, 3);
                    plateMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                } else if (signType === '50') {
                    // Círculo: cylinder
                    plateGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.08, 24);
                    plateMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                } else {
                    plateGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.08, 6);
                    plateMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
                }

                const plate = new THREE.Mesh(plateGeo, plateMat);
                plate.position.y = 2.0;
                plate.rotation.x = Math.PI / 2; // mirar hacia el auto (plano vertical)
                sign.add(plate);

                // Borde rojo para CEDA y 50 (simple: un aro/cylinder un poco más grande detrás)
                if (signType === 'CEDA') {
                    const border = new THREE.Mesh(
                        new THREE.ConeGeometry(0.72, 0.05, 3),
                        new THREE.MeshStandardMaterial({ color: 0xd00000 })
                    );
                    border.position.y = 2.0;
                    border.rotation.x = Math.PI / 2;
                    border.rotation.z = Math.PI; // invertir para que parezca triángulo invertido
                    sign.add(border);

                    plate.rotation.z = Math.PI; // triángulo invertido
                    border.rotation.z = Math.PI;
                }

                if (signType === '50') {
                    const ring = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.62, 0.62, 0.03, 24),
                        new THREE.MeshStandardMaterial({ color: 0xd00000 })
                    );
                    ring.position.y = 2.0;
                    ring.rotation.x = Math.PI / 2;
                    sign.add(ring);
                }

                sign.position.set(x, 0.08, z);
                sign.rotation.y = rotY;
                parent.add(sign);
                return sign;
            }

            // Colocar señales alrededor de la intersección
            addSignPost(-6.5, 6.5, 'PARE', Math.PI * 0.25);
            addSignPost(6.5, -6.5, 'CEDA', -Math.PI * 0.75);
            addSignPost(-6.5, -6.5, '50', Math.PI * 0.75);
            addSignPost(6.5, 6.5, '50', -Math.PI * 0.25);
        }

        function updateVehicle() {
            // Control de dirección
            if (keys['a'] || keys['ArrowLeft']) vehicle.rotation.y += turnSpeed;
            if (keys['d'] || keys['ArrowRight']) vehicle.rotation.y -= turnSpeed;

            // Control de velocidad
            if (keys['w'] || keys['ArrowUp']) speed += acceleration;
            if (keys['s'] || keys['ArrowDown']) speed -= acceleration;
            
            // Tecla Reiniciar
            if (keys['r']) {
                vehicle.position.set(0, 0.1, 0);
                vehicle.rotation.set(0, 0, 0);
                speed = 0;
            }

            // Aplicar fricción (desaceleración natural)
            speed *= friction;

            // Limitar velocidad máxima
            speed = Math.max(-maxSpeed / 2, Math.min(maxSpeed, speed));

            // Mover el vehículo en la dirección a la que mira
            vehicle.translateZ(-speed); 

            // Actualizar la posición de la cámara para que siga al auto (Chase Cam)
            // Crear un offset suave detrás y arriba
            const relativeCameraOffset = new THREE.Vector3(0, 3, 7);
            const cameraOffset = relativeCameraOffset.applyMatrix4(vehicle.matrixWorld);

            camera.position.x = cameraOffset.x;
            camera.position.y = cameraOffset.y;
            camera.position.z = cameraOffset.z;

            // Mirar al auto
            camera.lookAt(vehicle.position);
        }

        function animate() {
            requestAnimationFrame(animate);
            updateVehicle();
            // if (controls) controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
